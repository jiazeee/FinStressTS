run:
  run_id: example_crypto_deepvar
  output_dir: outputs
  seed: 42

dataset:
  name: custom_csv
  path: data/example/example_returns_wide.csv
  format: wide
  date_column: date
  target_columns: null

preprocessing:
  value_kind: returns
  price_to_log_return: false
  missing_method: ffill
  standardize: true

split:
  train_size: 0.6
  val_size: 0.2

task:
  context_length: 96
  prediction_length: 1
  stride: 1

model:
  name: deepvar
  params:
    hidden_size: 40
    num_layers: 2
    rnn_type: LSTM
    dropout: 0.1
    rank: 5
    embedding_dim: 5
    freq: B
    use_time_features: true
    use_scale_feature: true
    batch_size: 128
    max_epochs: 10
    learning_rate: 1.0e-3
    weight_decay: 0.0
    gradient_clip_val: 10.0
    patience: 3
    scaling: false
    device: auto

forecast:
  num_samples: 100

evaluation:
  quantiles: [0.1, 0.5, 0.9]
  coverage_levels: [0.5, 0.9]
  var_alpha: 0.05


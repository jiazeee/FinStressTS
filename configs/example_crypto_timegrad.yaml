run:
  run_id: example_crypto_timegrad
  output_dir: outputs
  seed: 42

dataset:
  name: custom_csv
  path: data/example/example_returns_wide.csv
  format: wide
  date_column: date
  target_columns: null

preprocessing:
  value_kind: returns
  price_to_log_return: false
  missing_method: ffill
  standardize: true

split:
  train_size: 0.6
  val_size: 0.2

task:
  context_length: 96
  prediction_length: 1
  stride: 1

model:
  name: timegrad
  params:
    input_size: null
    freq: B
    prediction_length: null
    target_dim: null
    context_length: null
    num_layers: 2
    num_cells: 40
    cell_type: LSTM
    num_parallel_samples: 100
    dropout_rate: 0.1
    cardinality: [1]
    embedding_dimension: 5
    conditioning_length: 100
    diff_steps: 100
    loss_type: l2
    beta_start: 1.0e-4
    beta_end: 0.1
    beta_schedule: linear
    residual_layers: 8
    residual_channels: 8
    dilation_cycle_length: 2
    scaling: true
    pick_incomplete: false
    lags_seq: null
    batch_size: 32
    max_epochs: 10
    lr: 1.0e-3
    weight_decay: 0.0
    gradient_clip_val: 10.0
    patience: 3
    device: auto

forecast:
  num_samples: 100

evaluation:
  quantiles: [0.1, 0.5, 0.9]
  coverage_levels: [0.5, 0.9]
  var_alpha: 0.05


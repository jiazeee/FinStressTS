model:
  name: timemcl
  params:
    input_size: null
    freq: B
    prediction_length: null
    target_dim: null
    context_length: null
    num_layers: 2
    num_cells: 40
    cell_type: LSTM
    num_parallel_samples: 100
    dropout_rate: 0.1
    embedding_dimension: 0
    conditioning_length: 100
    num_hypotheses: 4
    mcl_hidden_dim: 300
    mcl_loss_type: min_ext_sum
    score_loss_weight: 0.5
    wta_mode: wta
    wta_mode_params:
      epsilon: null
      temperature_ini: 10
      temperature: 10
      scheduler_mode: exponential
      temperature_decay: 0.95
      temperature_lim: 5.0e-4
      wta_after_temperature_lim: true
    single_linear_layer: true
    backbone_deleted: true
    scaling: true
    scaler_type: mean
    pick_incomplete: false
    lags_seq: null
    sample_hyps: true
    sample_noise_std: 0.0
    batch_size: 32
    max_epochs: 100
    lr: 1.0e-3
    weight_decay: 1.0e-8
    gradient_clip_val: 10.0
    patience: 10
    device: auto

